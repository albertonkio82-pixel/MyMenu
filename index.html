<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Il Nostro Menù</title>
<meta name="description" content="Menu settimanale condiviso">
<meta name="theme-color" content="#4B5D3A">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Il Nostro Menù">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F7F0DE;
    --paper-dim:#EFE5C8;
    --ink:#2B2118;
    --ink-soft:#6b5f4d;
    --basil:#4B5D3A;
    --basil-dark:#37452a;
    --ochre:#C98A2B;
    --rust:#A64B2A;
    --line:#DDD0B0;
    --radius:14px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--basil-dark);}
  body{
    font-family:'Work Sans',sans-serif;
    color:var(--ink);
    min-height:100vh;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .app{
    max-width:560px;
    margin:0 auto;
    background:var(--paper);
    min-height:100vh;
    box-shadow:0 0 40px rgba(0,0,0,.25);
    padding-top:env(safe-area-inset-top);
  }

  /* HEADER */
  header{
    padding:22px 20px 14px;
    background:var(--basil);
    color:var(--paper);
    border-bottom:4px solid var(--ochre);
  }
  header .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:.12em;
    text-transform:uppercase;
    opacity:.75;
  }
  header h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:28px;
    margin:2px 0 4px;
    letter-spacing:-.01em;
  }
  header p{margin:0; font-size:13.5px; opacity:.85;}
  .header-actions{display:flex; gap:6px; margin-top:14px;}
  .btn-ghost{
    flex:1;
    background:rgba(247,240,222,.12);
    border:1px solid rgba(247,240,222,.35);
    color:var(--paper);
    padding:9px 6px;
    border-radius:10px;
    font-family:'Work Sans',sans-serif;
    font-size:12.5px;
    font-weight:500;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:5px;
    white-space:nowrap;
  }
  .btn-ghost:active{background:rgba(247,240,222,.22);}
  .btn-ghost.on{background:var(--ochre); border-color:var(--ochre); color:var(--ink);}

  /* TABS SETTIMANE */
  .week-tabs{
    display:flex;
    gap:6px;
    padding:16px 16px 0;
  }
  .week-tab{
    flex:1;
    padding:9px 6px;
    border-radius:10px;
    border:none;
    background:var(--paper-dim);
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    font-weight:500;
    color:var(--ink-soft);
    cursor:pointer;
    text-align:center;
  }
  .week-tab.active{
    background:var(--basil);
    color:var(--paper);
  }

  /* TABS GIORNI */
  .day-tabs{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding:14px 16px 6px;
    scrollbar-width:none;
  }
  .day-tabs::-webkit-scrollbar{display:none;}
  .day-tab{
    flex:0 0 auto;
    padding:8px 14px;
    border-radius:20px;
    border:1.5px solid var(--line);
    background:transparent;
    font-family:'Work Sans',sans-serif;
    font-weight:500;
    font-size:13.5px;
    color:var(--ink-soft);
    cursor:pointer;
    white-space:nowrap;
  }
  .day-tab.active{
    background:var(--ink);
    border-color:var(--ink);
    color:var(--paper);
  }

  /* CONTENUTO GIORNO */
  .day-panel{padding:6px 18px 40px;}
  .progress-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin:10px 0 20px;
    font-family:'IBM Plex Mono',monospace;
    font-size:11.5px;
    color:var(--ink-soft);
  }
  .progress-track{
    flex:1;
    height:5px;
    background:var(--paper-dim);
    border-radius:3px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background:var(--ochre);
    border-radius:3px;
    transition:width .35s ease;
  }

  .meal{margin-bottom:26px;}
  .meal-title{
    display:flex;
    align-items:baseline;
    gap:10px;
    margin-bottom:8px;
  }
  .meal-title .label{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:18px;
  }
  .meal-title .rule{flex:1; height:1px; background:var(--line);}
  .meal-name{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:var(--ink-soft);
    font-style:italic;
    margin:-4px 0 10px;
  }

  .item{
    display:flex;
    align-items:flex-start;
    gap:12px;
    padding:9px 0;
    border-bottom:1px solid var(--paper-dim);
    cursor:pointer;
  }
  .item:last-child{border-bottom:none;}
  .stamp{
    flex:0 0 auto;
    width:22px; height:22px;
    border-radius:50%;
    border:2px solid var(--ochre);
    margin-top:2px;
    position:relative;
    transition:background .15s ease, border-color .15s ease, transform .1s ease;
  }
  .item:active .stamp{transform:scale(.9);}
  .item.done .stamp{
    background:var(--ochre);
    border-color:var(--ochre);
  }
  .item.done .stamp::after{
    content:'';
    position:absolute;
    left:5px; top:9px;
    width:9px; height:5px;
    border-left:2px solid var(--paper);
    border-bottom:2px solid var(--paper);
    transform:rotate(-45deg);
  }
  .item-text{font-size:15px; line-height:1.35; padding-top:1px;}
  .item.done .item-text{color:var(--ink-soft); text-decoration:line-through; text-decoration-color:var(--rust);}
  .item-text .qty{
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;
    color:var(--basil);
    font-weight:500;
  }
  .item.done .item-text .qty{color:var(--ink-soft);}

  .note-box{
    margin-top:6px;
    padding:10px 12px;
    background:var(--paper-dim);
    border-left:3px solid var(--basil);
    border-radius:6px;
    font-size:12.5px;
    color:var(--ink-soft);
    font-style:italic;
  }

  .condiment{
    margin-top:8px;
    padding-top:14px;
    border-top:2px dashed var(--line);
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:var(--ink-soft);
    text-align:center;
  }

  /* INSTALL BANNER */
  .install-banner{
    position:sticky;
    bottom:0;
    margin:0 16px 16px;
    background:var(--ink);
    color:var(--paper);
    border-radius:12px;
    padding:12px 14px;
    display:none;
    align-items:center;
    gap:10px;
    font-size:13px;
    box-shadow:0 6px 20px rgba(0,0,0,.3);
  }
  .install-banner.show{display:flex;}
  .install-banner button{
    background:var(--ochre);
    color:var(--ink);
    border:none;
    padding:8px 12px;
    border-radius:8px;
    font-weight:600;
    font-size:12.5px;
    cursor:pointer;
    white-space:nowrap;
  }
  .install-banner .close{
    background:none; border:none; color:var(--paper); opacity:.6; font-size:16px; padding:2px 6px; cursor:pointer;
  }

  .toast{
    position:fixed;
    left:50%; bottom:24px;
    transform:translate(-50%, 20px);
    background:var(--ink);
    color:var(--paper);
    padding:10px 18px;
    border-radius:24px;
    font-size:13px;
    opacity:0;
    transition:opacity .25s ease, transform .25s ease;
    pointer-events:none;
    z-index:50;
  }
  .toast.show{opacity:1; transform:translate(-50%, 0);}

  /* STAMPA / PDF */
  .print-header{display:none;}
  @media print{
    body{background:#fff;}
    .app{box-shadow:none; max-width:100%; background:#fff;}
    header, .week-tabs, .day-tabs, .install-banner, .toast, .no-print{display:none !important;}
    .day-panel{padding:0 6mm;}
    .print-header{display:block; margin-bottom:16px;}
    .print-header .pt-title{font-family:'Fraunces',serif; font-weight:700; font-size:21px; color:#000;}
    .print-header .pt-sub{font-family:'IBM Plex Mono',monospace; font-size:11px; color:#555; margin-top:2px;}
    .meal-title .label{color:#000 !important;}
    .meal-title .rule{background:#000;}
    .stamp{border-color:#000 !important; background:#fff !important;}
    .stamp::after{display:none !important;}
    .item{border-bottom:1px solid #ccc; break-inside:avoid;}
    .item-text{color:#000 !important; text-decoration:none !important;}
    .item-text .qty{color:#000 !important;}
    .meal{break-inside:avoid;}
  }
</style>
</head>

    <button id="installBtn">Installa</button>

</div>

<div class="toast" id="toast"></div>

  cPesce2:[ // cena domenica

    {name:"Sogliola mediterranea", items:[{t:"Filetti di sogliola con pomodori, olive e capperi",q:"400 g"},V.cotta]},
    {name:"Orata al vapore", items:[{t:"Orata al vapore con olio e prezzemolo",q:"180 g"},V.cotta]},
    {name:"Merluzzo mediterraneo", items:[{t:"Filetti di merluzzo con pomodori, olive e capperi",q:"400 g"},V.cotta]}
  ]
};

// giorno -> quali pool usa per ciascun pasto + eventuale spuntino fisso
const DAY_TEMPLATE = [
  {day:"Lunedì",  short:"Lun", col:"colA", pranzo:"pMozza",    cena:"cLegumi", spuntinoExtra:null},
  {day:"Martedì", short:"Mar", col:"colB", pranzo:"pSalumi",   cena:"cPesce",  spuntinoExtra:"yomo"},
  {day:"Mercoledì",short:"Mer",col:"colC", pranzo:"pCarne",    cena:"cMozza",  spuntinoExtra:null},
  {day:"Giovedì", short:"Gio", col:"colA", pranzo:"pFarinata", cena:"cUovo",   spuntinoExtra:null},
  {day:"Venerdì", short:"Ven", col:"colB", pranzo:"pLegumi",   cena:"cCarne",  spuntinoExtra:"yomo"},
  {day:"Sabato",  short:"Sab", col:"colC", pranzo:"pTonno",    cena:"cPizza",  spuntinoExtra:null},
  {day:"Domenica",short:"Dom", col:"colA", pranzo:"pCarne2",   cena:"cPesce2", spuntinoExtra:null}
];

function pick(poolName, week){
  const pool = POOLS[poolName];
  return pool[week % pool.length];
}

// costruisce le 4 settimane (28 giorni)
const MENU = [];
for(let w=0; w<4; w++){
  DAY_TEMPLATE.forEach(t=>{
    const spuntinoItems = [{t: FRUTTA_ROT[w], q:"1 pugno"}];
    if(t.spuntinoExtra === "yomo") spuntinoItems.unshift({t:"Yogurt Yomo zero frutti di bosco", q:"1 vasetto 125 g"});
    MENU.push({
      day: t.day, short: t.short, week: w,
      colazione: pick(t.col, w),
      pranzo: pick(t.pranzo, w),
      spuntino: { name: t.spuntinoExtra==="yomo" ? "Yogurt e frutta" : "Frutta", items: spuntinoItems },
      cena: pick(t.cena, w)
    });
  });
}
const CONDIMENT = "Olio EVO: 2 cucchiai da minestra al giorno, distribuiti sui pasti";

// ---------- LISTA DELLA SPESA ----------
const CATEGORY_ORDER = ["Frutta e verdura","Pane, cereali e farine","Latticini e uova","Carne, pesce e legumi","Dispensa e condimenti","Altro"];

function categorize(name){
  const n = name.toLowerCase();
  if(/(verdura|pomodor|cipolla|aglio|basilico|prezzemolo|frutta)/.test(n)) return CATEGORY_ORDER[0];
  if(/(pane|farro|orzo|couscous|farina|biscott|fette|cereali|muesli|fiocchi|riso|pasta|patate|grancereale)/.test(n)) return CATEGORY_ORDER[1];
  if(/(mozzarella|yogurt|latte|formaggio|uovo)/.test(n)) return CATEGORY_ORDER[2];
  if(/(pollo|tacchino|manzo|hamburger|bresaola|speck|prosciutto|merluzzo|sogliola|orata|salmone|tonno|bastoncini|legum|hummus|polpette|burger|zuppa|bistecca)/.test(n)) return CATEGORY_ORDER[3];
  if(/(caffè|marmellata|miele|crema novi|olio|sale|capperi|olive|pepe|gocciole)/.test(n)) return CATEGORY_ORDER[4];
  return CATEGORY_ORDER[5];
}

function parseQty(q){
  const m = q.match(/^([\d]+(?:[.,]\d+)?)\s*(.*)$/);
  return m ? {num: parseFloat(m[1].replace(',','.')), unit: m[2].trim()} : null;
}

function formatQtys(qtys){
  const parsed = qtys.map(parseQty);
  if(parsed.every(p=>p)){
    const units = [...new Set(parsed.map(p=>p.unit))];
    if(units.length === 1){
      const tot = parsed.reduce((s,p)=>s+p.num,0);
      const totStr = Number.isInteger(tot) ? String(tot) : tot.toFixed(1).replace('.',',');
      return `${totStr} ${units[0]}`.trim();
    }
  }
  const counts = {};
  qtys.forEach(q=> counts[q] = (counts[q]||0)+1);
  return Object.entries(counts).map(([q,c])=> c>1 ? `${c}× ${q}` : q).join(' + ');
}

function aggregateWeek(w){
  const map = {};
  for(let i=0;i<7;i++){
    const d = MENU[w*7+i];
    ['colazione','pranzo','spuntino','cena'].forEach(m=>{
      if(!d[m]) return;
      d[m].items.forEach(it=>{
        const key = it.t.trim();
        if(!map[key]) map[key] = {name:key, category:categorize(key), qtys:[]};
        map[key].qtys.push(it.q);
      });
    });
  }
  return map;
}

// ---------- STATO (localStorage, condiviso via installazione su entrambi i telefoni) ----------
const STORE_KEY = "menu-goloso-stato-v2";
function loadState(){ try{ return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }catch(e){ return {}; } }
function saveState(s){ localStorage.setItem(STORE_KEY, JSON.stringify(s)); }
let state = loadState();

function itemKey(dayIdx, meal, i){ return dayIdx+"_"+meal+"_"+i; }

// ---------- RENDER ----------
let todayIdx = new Date().getDay();
todayIdx = todayIdx === 0 ? 6 : todayIdx - 1; // 0=Lunedì..6=Domenica
let activeWeek = 0;
let activeDayInWeek = todayIdx;
let viewMode = 'menu'; // 'menu' | 'spesa'
function globalIdx(){ return activeWeek*7 + activeDayInWeek; }

const weekTabsEl = document.getElementById('weekTabs');
const tabsEl = document.getElementById('dayTabs');
const panelEl = document.getElementById('dayPanel');

function renderWeekTabs(){
  weekTabsEl.innerHTML = "";
  for(let w=0; w<4; w++){
    const b = document.createElement('button');
    b.className = 'week-tab' + (w===activeWeek ? ' active' : '');
    b.textContent = "Sett. " + (w+1);
    b.onclick = ()=>{ activeWeek = w; renderWeekTabs(); renderTabs(); renderPanel(); };
    weekTabsEl.appendChild(b);
  }
}

function renderTabs(){
  tabsEl.innerHTML = "";
  DAY_TEMPLATE.forEach((d, i)=>{
    const b = document.createElement('button');
    b.className = 'day-tab' + (i===activeDayInWeek ? ' active' : '');
    b.textContent = d.short;
    b.onclick = ()=>{ activeDayInWeek = i; renderTabs(); renderPanel(); };
    tabsEl.appendChild(b);
  });
}

function mealBlock(dayIdx, mealKey, mealLabel, meal){
  if(!meal) return "";
  const wrap = document.createElement('div');
  wrap.className = 'meal';
  wrap.innerHTML = `
    <div class="meal-title"><span class="label">${mealLabel}</span><span class="rule"></span></div>
    <div class="meal-name">${meal.name}</div>
  `;
  meal.items.forEach((it, i)=>{
    const key = itemKey(dayIdx, mealKey, i);
    const done = !!state[key];
    const row = document.createElement('div');
    row.className = 'item' + (done ? ' done' : '');
    row.innerHTML = `<div class="stamp"></div><div class="item-text">${it.t} <span class="qty">${it.q}</span></div>`;
    row.onclick = ()=>{
      state[key] = !state[key];
      saveState(state);
      renderPanel();
    };
    wrap.appendChild(row);
  });
  if(meal.note){
    const n = document.createElement('div');
    n.className = 'note-box';
    n.textContent = meal.note;
    wrap.appendChild(n);
  }
  return wrap;
}

function renderSpesa(){
  panelEl.innerHTML = "";

  const today = new Date().toLocaleDateString('it-IT', {day:'2-digit', month:'long', year:'numeric'});
  const ph = document.createElement('div');
  ph.className = 'print-header';
  ph.innerHTML = `<div class="pt-title">Lista della spesa — Settimana ${activeWeek+1}</div><div class="pt-sub">Il Nostro Menù · generata il ${today}</div>`;
  panelEl.appendChild(ph);

  const topRow = document.createElement('div');
  topRow.className = 'progress-row no-print';
  topRow.innerHTML = `<span>Lista spesa · Settimana ${activeWeek+1}</span>`;
  const dl = document.createElement('button');
  dl.className = 'btn-ghost';
  dl.style.flex = '0 0 auto';
  dl.style.color = 'var(--ink)';
  dl.style.borderColor = 'var(--basil)';
  dl.style.background = 'var(--paper-dim)';
  dl.textContent = '📄 Stampa / PDF';
  dl.onclick = ()=> window.print();
  topRow.appendChild(dl);
  panelEl.appendChild(topRow);

  const map = aggregateWeek(activeWeek);
  CATEGORY_ORDER.forEach(cat=>{
    const items = Object.values(map).filter(i=>i.category===cat);
    if(!items.length) return;
    const wrap = document.createElement('div');
    wrap.className = 'meal';
    wrap.innerHTML = `<div class="meal-title"><span class="label">${cat}</span><span class="rule"></span></div>`;
    items.forEach(i=>{
      const key = `spesa_${activeWeek}_${i.name}`;
      const done = !!state[key];
      const row = document.createElement('div');
      row.className = 'item' + (done ? ' done' : '');
      row.innerHTML = `<div class="stamp"></div><div class="item-text">${i.name} <span class="qty">${formatQtys(i.qtys)}</span></div>`;
      row.onclick = ()=>{ state[key] = !state[key]; saveState(state); renderSpesa(); };
      wrap.appendChild(row);
    });
    panelEl.appendChild(wrap);
  });
}

function renderPanel(){
  if(viewMode === 'spesa'){ renderSpesa(); return; }
  const gi = globalIdx();
  const d = MENU[gi];
  panelEl.innerHTML = "";

  // progresso
  const allKeys = [];
  ["colazione","pranzo","spuntino","cena"].forEach(m=>{
    if(d[m]) d[m].items.forEach((_,i)=> allKeys.push(itemKey(gi,m,i)));
  });
  const doneCount = allKeys.filter(k=>state[k]).length;
  const pct = allKeys.length ? Math.round(doneCount/allKeys.length*100) : 0;

  const progress = document.createElement('div');
  progress.className = 'progress-row';
  progress.innerHTML = `<span>${d.day} · Settimana ${d.week+1} · ${doneCount}/${allKeys.length}</span><div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>`;
  panelEl.appendChild(progress);

  panelEl.appendChild(mealBlock(gi,'colazione','Colazione', d.colazione));
  panelEl.appendChild(mealBlock(gi,'pranzo','Pranzo', d.pranzo));
  if(d.spuntino) panelEl.appendChild(mealBlock(gi,'spuntino','Spuntino', d.spuntino));
  panelEl.appendChild(mealBlock(gi,'cena','Cena', d.cena));

  const cond = document.createElement('div');
  cond.className = 'condiment';
  cond.textContent = CONDIMENT;
  panelEl.appendChild(cond);
}

renderWeekTabs();
renderTabs();
renderPanel();

// ---------- LISTA SPESA TOGGLE ----------
const spesaBtn = document.getElementById('spesaBtn');
spesaBtn.onclick = ()=>{
  viewMode = viewMode === 'spesa' ? 'menu' : 'spesa';
  spesaBtn.classList.toggle('on', viewMode === 'spesa');
  spesaBtn.textContent = viewMode === 'spesa' ? '📋 Torna al menu' : '🛒 Lista spesa';
  tabsEl.style.display = viewMode === 'spesa' ? 'none' : 'flex';
  renderPanel();
};

// ---------- RESET ----------
document.getElementById('resetBtn').onclick = ()=>{
  if(confirm("Azzerare tutte le spunte del mese?")){
    state = {};
    saveState(state);
    renderPanel();
    showToast("Mese azzerato");
  }
};

// ---------- CONDIVIDI ----------
document.getElementById('shareBtn').onclick = async ()=>{
  const url = window.location.href;
  if(navigator.share){
    try{ await navigator.share({ title:"Il Nostro Menù", text:"Il nostro menu settimanale", url }); }
    catch(e){}
  } else {
    await navigator.clipboard.writeText(url);
    showToast("Link copiato — invialo su WhatsApp");
  }
};

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 2200);
}

// ---------- PWA INSTALL ----------
let deferredPrompt;
const banner = document.getElementById('installBanner');
window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault();
  deferredPrompt = e;
  if(!localStorage.getItem('install-dismissed')) banner.classList.add('show');
});
document.getElementById('installBtn').onclick = async ()=>{
  if(deferredPrompt){
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
  }
  banner.classList.remove('show');
};
document.getElementById('closeInstall').onclick = ()=>{
  banner.classList.remove('show');
  localStorage.setItem('install-dismissed','1');
};

// ---------- SERVICE WORKER ----------
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
